            - $ref: '#/definitions/resp.Resp'
            - properties:
                data:
                  $ref: '#/definitions/resp.PaginatedListActivitiesResp'
              type: object
      summary: 通过日期查找活动
      tags:
      - Activity
  /act/draft:
    post:
      consumes:
